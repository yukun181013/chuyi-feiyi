name: Deploy to Vercel (Production)

# main 有新提交时自动部署到生产；也可在 Actions 页面手动触发（workflow_dispatch）
on:
  push:
    branches: [main]
  workflow_dispatch:

# org / project 标识符不是敏感凭据，单独无法部署（必须配合仓库密钥 VERCEL_TOKEN）
env:
  VERCEL_ORG_ID: team_rPx5XCgGGsl5nGxVwejORBPP
  VERCEL_PROJECT_ID: prj_0SBZ77CJngFglWEgXkGny3octR3k

# 同一时间只保留一个生产部署，新提交自动取消进行中的旧部署
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings & env
        run: vercel pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build with Vercel
        run: vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
